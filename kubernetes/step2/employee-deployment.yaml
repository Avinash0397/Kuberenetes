apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
    spec:
      containers:
      - name: employee
        image: sachinchaudhary1/employee:latest
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: employee
spec:
  type: NodePort
  selector:
    app: employee
  ports:
  - port: 80
    targetPort: 8082
    nodePort: 30082
