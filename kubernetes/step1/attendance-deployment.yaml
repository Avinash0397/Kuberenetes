apiVersion: apps/v1
kind: Deployment
metadata:
  name: attendance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attendance
  template:
    metadata:
      labels:
        app: attendance
    spec:
      containers:
      - name: attendance
        image: sachinchaudhary1/attendance:latest
        ports:
        - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: attendance
spec:
  type: NodePort
  selector:
    app: attendance
  ports:
  - port: 80
    targetPort: 8081
    nodePort: 30081
